name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.5"

jobs:
  lint:
    name: Lint (ruff + black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev --all-extras --frozen

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: black check
        run: uv run black --check src/ tests/

      - name: mypy
        run: uv run mypy src/ tests/ --ignore-missing-imports

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --all-extras --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest \
            -n auto \
            --cov=src/ai_candle_predictor \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  build:
    name: Build (hatchling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: uv sync --frozen

      - name: Build package
        run: uv build

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wheel
          path: dist/*.whl
